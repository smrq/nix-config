$ipc = noctalia-shell ipc call

env = XDG_CURRENT_DESKTOP,Hyprland

exec-once = dbus-update-activation-environment --systemd --all
exec-once = systemctl --user start hyprland-session.target
exec-once = noctalia-shell

input {
    kb_layout = us
    numlock_by_default = true
    scroll_factor = 1.5
    follow_mouse = 2
}

general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    layout = dwindle
    resize_on_border = true
}

decoration {
    rounding = 10

    shadow {
        enabled = true
        range = 4
        render_power = 3
    }

    blur {
        enabled = true
        size = 3
        passes = 2
        vibrancy = 0.1696
    }
}

animations {
    enabled = true

    animation = windowsIn, 1, 3, default
    animation = windowsOut, 1, 3, default
    animation = workspaces, 1, 5, default
    animation = windowsMove, 1, 4, default
    animation = fade, 1, 3, default
    animation = border, 1, 3, default
}

dwindle {
    preserve_split = true
}

master {
    mfact = 0.5
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
}

windowrule = tile on, match:class ^(org\.wezfurlong\.wezterm)$

windowrule = rounding 12, match:class ^(org\.gnome\.)

windowrule = tile on, match:class ^(gnome-control-center)$
windowrule = tile on, match:class ^(pavucontrol)$
windowrule = tile on, match:class ^(nm-connection-editor)$

windowrule = float on, match:class ^(gnome-calculator)$
windowrule = float on, match:class ^(galculator)$
windowrule = float on, match:class ^(blueman-manager)$
windowrule = float on, match:class ^(org\.gnome\.Nautilus)$
windowrule = float on, match:class ^(xdg-desktop-portal)$

# TODO: fix `invalid field type noinitialfocus`
# windowrule = noinitialfocus on, match:class ^(steam)$, match:title ^(notificationtoasts)
windowrule = pin on, match:class ^(steam)$, match:title ^(notificationtoasts)

windowrule = float on, match:class ^(firefox)$, match:title ^(Picture-in-Picture)$
windowrule = float on, match:class ^(zoom)$

# DMS windows floating by default
# ! Hyprland doesn't size these windows correctly so disabling by default here
# windowrule = float on, match:class ^(org.quickshell)$

layerrule = no_anim on, match:namespace ^(quickshell)$

layerrule {
  name = noctalia
  match:namespace = noctalia-background-.*$
  ignore_alpha = 0.5
  blur = true
  blur_popups = true
}

bind = SUPER, space, exec, $ipc launcher toggle
bind = SUPER SHIFT, slash, exec, $ipc plugin:keybind-cheatsheet toggle
bind = SUPER, tab, hyprtasking:toggle, all


bind = SUPER, return, exec, kitty
bind = SUPER, B, exec, firefox
bind = SUPER, E, exec, dolphin

# === Audio Controls ===
bindel = , XF86AudioRaiseVolume, exec, $ipc volume increase
bindel = , XF86AudioLowerVolume, exec, $ipc volume decrease
bindl = , XF86AudioMute, exec, $ipc volume muteOutput
bindl = , XF86AudioMicMute, exec, $ipc volume muteInput
bindl = , XF86AudioPlay, exec, $ipc media playPause
bindl = , XF86AudioPrev, exec, $ipc media previous
bindl = , XF86AudioNext, exec, $ipc media next

# === Brightness Controls ===
bindel = , XF86MonBrightnessUp, exec, $ipc brightness increase
bindel = , XF86MonBrightnessDown, exec, $ipc brightness decrease

# === Focus Navigation ===
bind = SUPER, left, movefocus, l
bind = SUPER, down, movefocus, d
bind = SUPER, up, movefocus, u
bind = SUPER, right, movefocus, r

# === Window Movement ===
bind = SUPER SHIFT, left, movewindow, l
bind = SUPER SHIFT, down, movewindow, d
bind = SUPER SHIFT, up, movewindow, u
bind = SUPER SHIFT, right, movewindow, r

# === Workspace Navigation ===
bind = SUPER CTRL, left, workspace, r-1
bind = SUPER CTRL, right, workspace, r+1
bind = SUPER SHIFT CTRL, left, movetoworkspace, r-1
bind = SUPER SHIFT CTRL, right, movetoworkspace, r+1

# === Numbered Workspaces ===
bind = SUPER, F1, workspace, 1
bind = SUPER, F2, workspace, 2
bind = SUPER, F3, workspace, 3
bind = SUPER, F4, workspace, 4
bind = SUPER, F5, workspace, 5
bind = SUPER, F6, workspace, 6
bind = SUPER, F7, workspace, 7
bind = SUPER, F8, workspace, 8
bind = SUPER, F9, workspace, 9
bind = SUPER, F10, workspace, 10
bind = SUPER, F11, workspace, 11
bind = SUPER, F12, workspace, 12

# === Move to Numbered Workspaces ===
bind = SUPER SHIFT, F1, movetoworkspace, 1
bind = SUPER SHIFT, F2, movetoworkspace, 2
bind = SUPER SHIFT, F3, movetoworkspace, 3
bind = SUPER SHIFT, F4, movetoworkspace, 4
bind = SUPER SHIFT, F5, movetoworkspace, 5
bind = SUPER SHIFT, F6, movetoworkspace, 6
bind = SUPER SHIFT, F7, movetoworkspace, 7
bind = SUPER SHIFT, F8, movetoworkspace, 8
bind = SUPER SHIFT, F9, movetoworkspace, 9
bind = SUPER SHIFT, F10, movetoworkspace, 10
bind = SUPER SHIFT, F11, movetoworkspace, 11
bind = SUPER SHIFT, F12, movetoworkspace, 12

# === Sizing & Layout ===
bind = SUPER, R, layoutmsg, togglesplit
bind = SUPER CTRL, F, resizeactive, exact 100%

# Core binds
# bind = SUPER, S, exec, $ipc controlCenter toggle
# bind = SUPER, comma, exec, $ipc settings toggle

# bind = SUPER, V, exec, dms ipc call clipboard toggle
# bind = SUPER, M, exec, dms ipc call processlist focusOrToggle
# bind = SUPER, comma, exec, dms ipc call settings focusOrToggle
# bind = SUPER, N, exec, dms ipc call notifications toggle
# bind = SUPER SHIFT, N, exec, dms ipc call notepad toggle
# bind = SUPER, Y, exec, dms ipc call dankdash wallpaper
# bind = SUPER, TAB, exec, dms ipc call hypr toggleOverview
# bind = SUPER, X, exec, dms ipc call powermenu toggle

# === Security ===
bind = SUPER, L, exec, $ipc lockScreen lock
# bind = SUPER SHIFT, E, exit
# bind = CTRL ALT, Delete, exec, dms ipc call processlist focusOrToggle

# === Window Management ===
bind = SUPER, Q, killactive
bind = SUPER, F, fullscreen, 1
bind = SUPER SHIFT, F, fullscreen, 0
bind = SUPER SHIFT, T, togglefloating
bind = SUPER, W, togglegroup
# bind = SUPER SHIFT, W, exec, dms ipc call window-rules toggle

# === Screenshots ===
# bind = , Print, exec, dms screenshot
# bind = CTRL, Print, exec, dms screenshot full
# bind = ALT, Print, exec, dms screenshot window

# === System Controls ===
# bind = SUPER SHIFT, P, dpms, toggle

plugin {
    hyprbars {
        bar_height = 20
        bar_color = rgba(23263480)
        bar_blur = true
        col.text = rgba(ffffffcc)
        bar_text_size = 9
        bar_text_font = Iosevka Bold
        bar_text_align = left

        # bar_part_of_window = true
        # bar_precedence_over_border = true

        bar_part_of_window = false
        bar_precedence_over_border = false
        hyprbars-button = rgba(e78284cc), 12, , hyprctl dispatch killactive
        hyprbars-button = rgba(e5c890cc), 12, , hyprctl dispatch fullscreen 2
        hyprbars-button = rgba(8caaeecc), 12, , hyprctl dispatch togglefloating
    }
}

plugin {
    hyprtasking {
        layout = grid
        bg_color = 0x232634
        drag_button = 0x111
        select_button = 0x110
        grid {
            rows = 2
            cols = 3
        }
    }
}

xwayland {
  force_zero_scaling = true
}